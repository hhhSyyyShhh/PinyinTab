name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64 / Bash
            os: ubuntu-22.04
            shell_test: ./scripts/test-completion.sh
          - name: macOS arm64 / Zsh
            os: macos-15
            shell_test: ./scripts/test-macos.zsh
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Show runner architecture
        run: uname -a
      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable
      - name: Rust tests
        run: cargo test --locked --all-targets
      - name: Release build
        run: cargo build --release --locked
      - name: Shell syntax
        run: |
          bash -n install.sh uninstall.sh shell/pinyintab.bash scripts/*.sh
          zsh -n shell/pinyintab.zsh scripts/test-macos.zsh
      - name: Completion integration tests
        env:
          PINYINTAB_BINARY: ${{ github.workspace }}/target/release/ptab
        run: ${{ matrix.shell_test }}

  quality:
    name: Rust formatting and lints
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets -- -D warnings
